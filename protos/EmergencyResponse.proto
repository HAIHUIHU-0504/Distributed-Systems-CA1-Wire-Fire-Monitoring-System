syntax = "proto3";

option java_multiple_files = true;
option java_package = "grpc.EmergencyResponseService";
option java_outer_classname = "EmergencyResponseServiceImpl";

package EmergencyResponseService;

service EmergencyResponseService {
  // UNARY: Activate on-site sprinklers
  rpc ActivateSprinklers(ActionRequest) returns (ActionResponse) {}

  // BI-DIRECTIONAL: Real-time status feedback from devices
  rpc MonitorDeviceStatus(stream DeviceHealthRequest) returns (stream DeviceStatusResponse) {}
}

message ActionRequest {
  string location = 1;
  bool activate = 2;
}

message ActionResponse {
  bool success = 1;
  string message = 2;
}

message DeviceHealthRequest {
  string deviceID = 1;
}

message DeviceStatusResponse {
  string deviceID = 1;
  string status = 2; // e.g., "Working", "Blocked", "Empty"
}